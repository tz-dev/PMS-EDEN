readable_structural_closure:
  summary: >
    This example corrects a dependency reversal. Eden does not teach or found
    PMS-EDEN as a learning myth, transgression myth, guilt-origin story, sexed
    blame story, theological proof path, or source of Reciprocity Loss. It
    functions as a late compact demonstration of a grammar already developed
    elsewhere: coordinated Ω, boundary, breach, consequence activation, exposure
    shift, legibility management, and R trace. Adjacent theological, literary,
    symbolic, or anthropological readings remain possible, but they do not
    govern PMS-EDEN's schema.
  main_formula_used: "already-developed grammar → Eden as minimal test case; false-coordination only if displaced R and blocked Σ/Ψ are separately supported"
  support_level: "strong"
  final_status: "narrowed_reading"
  final_guardrail: "This example maps a scene. It does not diagnose persons, rank sexes, prescribe action, or authorize intervention."

assistant_test_vectors:
  should_recognize:
    - "Eden is being treated as the origin of PMS-EDEN rather than as a test scene."
    - "The breach is being redescribed as knowledge-origin, guilt-origin, sex-truth source, or transgression lesson."
    - "A mythic resemblance is being used as proof of the EDEN architecture."
    - "The correct order is already-developed grammar followed by Eden as minimal test case."
  should_not_infer:
    - "hidden motive"
    - "personality"
    - "pathology"
    - "sex essence"
    - "moral guilt"
    - "action recommendation"
  should_push_back_when:
    - "The reading treats Eden as foundation, proof path, universal history, guilt-origin theory, gender-blame story, sex-truth source, PFO origin, or source of Reciprocity Loss."
    - "The analysis dismisses adjacent theological, literary, symbolic, or anthropological readings instead of merely distinguishing them from PMS-EDEN."
    - "The scene is used to diagnose a person, rank sexes, prescribe action, or authorize intervention."
    - "No counter-scene or falsifier can be named."
  required_final_phrase: "This remains a scene-bound description, not a diagnosis, verdict, or prescription."