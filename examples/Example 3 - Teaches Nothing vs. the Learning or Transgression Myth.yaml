      - "mythic_or_universal_history"
      - "guilt_origin_theory"
      - "gender_blame_story"
      - "sex_truth_source"
      - "PFO_origin"
      - "source_of_Reciprocity_Loss"

case_guardrails:
  non_diagnostic: true
  non_prescriptive: true
  non_verdictive: true
  non_person_labeling: true
  non_sex_ranking: true
  no_hidden_motive_inference: true
  no_psychological_diagnosis: true
  no_therapy_or_intervention_protocol: true
  description_to_action_firewall: "active"
  validity_gate_reference: "validity_gate"
  required_method_conditions:
    canonical_pms_entry_condition: ["Χ", "reversibility", "D"]
    eden_application_requirements:
      - "scene_packet"
      - "counter_scene_exposure"
      - "contextual_responsibility"
      - "evidentiary_answerability"
      - "affected_role_contestation"
      - "independent_application_authority"
  core_rule: "Map the scene; do not diagnose persons, prescribe action, rank sexes, or authorize intervention."
  invalid_if_any:
    - "Χ_suspended_for_clarity_or_urgency"
    - "reversibility_suspended_for_verdict"
    - "D_suspended_for_truth_or_efficiency"
    - "scene_packet_replaced_by_impression"
    - "counter_scene_cannot_change_reading"
    - "responsibility_without_scene_conditions"
    - "description_converted_directly_into_binding"
    - "person_or_sex_label_substituted_for_scene_analysis"
  prohibited_shortcuts:
    - "EDEN-by-vibe"
    - "PFO-by-vibe"
    - "identity-based_assignment"
    - "sex-truth_inference"
    - "personality_inference"
    - "motive_inference_from_operator_trace"
    - "description_converted_into_obligation"

minimal_vignette:
  scene: >
    A compact Eden reading is presented as if the scene teaches that humanity
    begins through learning, transgression, guilt, sexed blame, or the origin of
    Reciprocity Loss. A bounded PMS-EDEN reading instead treats Eden as a late
    minimal test scene that receives an already-developed grammar: coordinated
    Ω, boundary, breach, consequence activation, exposure shift, legibility
    management, and R trace without theological, moral, sexed, or historical
    origin claim.
  temporal_boundary: "From the moment the Eden scene is introduced as a learning/transgression origin to the moment the reading is tested against PMS-EDEN's demotion of Eden into demonstration."
  roles:
    - id: "role_A"
      label: "origin-myth reading position"
    - id: "role_B"
      label: "PMS-EDEN test-scene reading position"
  surface_description: "The scene may initially appear to be a lesson about knowledge, sin, transgression, guilt, sexuality, or a founding Fall."
  eden_question: "Does the Eden scene found or teach the EDEN architecture, or does it only demonstrate an already-developed grammar under strict non-moral and non-origin boundaries?"

scene_packet:
  specified_scene: "An interpretive scene in which Eden is read as a learning/transgression myth and then corrected by PMS-EDEN as a late minimal test scene."
  role_positions:
    role_A:
      scene_position: "Frames Eden as origin, lesson, Fall narrative, or source of theoretical authority."
      not_identity: true
    role_B:
      scene_position: "Restrains the reading to PMS-EDEN's test-scene function and refuses origin, sex-truth, guilt, and theological proof roles."
      not_identity: true

  dominant_frame:
    candidate_frame: "legitimation"
    frame_description: "The origin-myth frame may attempt to legitimate the theory through a learning or transgression story, while the PMS-EDEN frame treats the same scene as subordinate demonstration."
    frame_status: "ambiguous"

  real_Ω:
    present: "true"
    summary: "A real interpretive asymmetry is present: an origin frame can control what counts as explanation, while the PMS-EDEN schema imposes a subordinate, non-foundational test-scene boundary. This establishes a real Ω mapping, not by itself a false-coordination finding."
    dimensions:
      capacity: "medium"
      exposure: "low"
      dependency: "low"
      protection: "low"
      timing_control: "medium"
      access_control: "low"
      recognition_control: "medium"
      explanation_burden: "medium"
      exit_or_waiting_cost: "low"
    asymmetry_not_failure_rule: "Asymmetry is not the failure; false coordination of asymmetry is the failure."

  relevant_Λ:
    present: "true"
    non_event_or_absence: "non-clarification"
    scene_structuring_effect: "If the distinction between origin and demonstration is not clarified, the missing boundary can let a mythic teaching frame substitute for the paper's operator-disciplined architecture."
    no_passive_praxis_check: "Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ."

  Θ_trajectory:
    sequence:
      - step: 1
        description: "The EDEN grammar is already developed through Adult Reciprocity, coordinated and false-coordinated real Ω, R, Σ, Ψ, D, and correctability."
      - step: 2
        description: "The Eden scene is introduced and may be misread as the origin of knowledge, guilt, sexed blame, or the loss structure itself."
      - step: 3
        description: "PMS-EDEN corrects the order: already-developed grammar goes first; Eden follows as minimal test case, not foundation, proof path, or regime claim."
    trajectory_status: "single_event"
    trajectory_origin_note: "Structurally, the grammar precedes the Eden test scene; this is an order-of-dependence claim, not a moral ranking or recurrence claim."

  structuring_effects:
    role_A_effects:
      - "May convert a compact demonstration into a founding narrative."
      - "May shift explanatory authority from scene-bound operator mapping to mythic resemblance."
      - "May overassign R, guilt, or sexed meaning beyond the specified scene."
    role_B_effects:
      - "Keeps Eden subordinate to the existing PMS-EDEN architecture."
      - "Separates consequence activation from knowledge-origin, guilt-origin, and sex-truth readings."
      - "Requires counter-scenes and falsifiers before any EDEN-MAP claim."
    shared_or_field_effects:
      - "The scene tests whether a symbolic or theological reading is being allowed to replace praxeological mapping."
      - "The central risk is dependency reversal: Eden becomes foundation rather than demonstration."
    unsupported_effects:
      - "No claim that theological, literary, symbolic, or anthropological readings are false within their own frameworks."
      - "No claim that any person, sex, or role-position is morally corrupted by the scene."
      - "No claim that learning, knowledge, sexuality, or transgression causes Reciprocity Loss."

  responsibility_distribution:
    pms_axis: "R"
    governing_formula: "R follows real structuring effect under available legibility, capacity, alternative possibility, Θ trajectory, and Ω cost/exposure conditions."
    role_A:
      structuring_effect: "supported"
      legibility: "available"
      capacity: "available"
      alternatives: "available"
      provisional_R_status: "displaced"
    role_B:
      structuring_effect: "supported"
      legibility: "available"
      capacity: "available"
      alternatives: "available"
      provisional_R_status: "proportionate"
    blame_guardrail: "R is not blame, guilt, moral worth, person condemnation, or total liability."

  recognition_and_protection:
    recognition_frame: "present"
    protection_frame: "present"
    D_status: "preserved"
    dignity_guardrail: "Responsibility must not degrade; protection must not immunize."

  Σ_Ψ_status:
    Σ_integration:
      status: "partially_open"
      note: "The origin-myth reading can integrate symbolic meaning, but it blocks PMS-EDEN integration if it replaces the schema's order of dependence."
    Ψ_self_binding:
      status: "open"
      note: "The corrected reading remains self-bound when it explicitly refuses to make Eden a foundation, proof path, sex truth, or guilt origin."
    load_shift:
      present: "false"
      formula: "low Ψ on one side → increased Ψ-load on the other."
      shifted_loads: []

  counter_scene_entry:
    required: true
    strongest_counter_scene: "A theological, literary, symbolic, or anthropological interpretation may legitimately read Eden as teaching, transgression, knowledge, or Fall within its own domain, without claiming PMS-EDEN dependency."
    what_would_support_it:
      - "The reading is explicitly located in theology, literary interpretation, ritual symbolism, or anthropology rather than PMS-EDEN architecture."
      - "It does not use mythic resemblance to derive, prove, or authorize EDEN constructs."
      - "It preserves the PMS-EDEN distinction between demonstration and foundation."
    what_would_weaken_eden:
      - "If the case were not about PMS-EDEN's own schema discipline but about an adjacent framework's independent interpretation."
      - "If no dependency reversal occurs and Eden remains only a comparison object."
      - "If the reading names no R displacement, blocked Σ/Ψ, or scene-bound consequence relevant to PMS-EDEN."

pms_operator_trace:
  status: "scene_mapping_not_new_operator_logic"
  operator_reference: "operator_reference"
  operator_set_fixed: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
  trace:
    "Δ": "Difference between Eden as origin lesson and Eden as late minimal test scene; not rank between frameworks."
    "∇": "Interpretive pressure to let the mythic scene carry explanatory force beyond its PMS-EDEN role."
    "□": "The frame is tested between origin/lesson/transgression and subordinate demonstration/test-scene."
    "Λ": "Missing clarification of non-foundational status structures possible dependency reversal."
    "Α": "No repetition or regime stabilization is established; origin-reading is only a possible attractor if repeated."
    "Ω": "Interpretive authority and explanatory burden are asymmetrically distributed between mythic origin framing and schema discipline."
    "Θ": "Already-developed grammar precedes Eden; misreading reverses the order; correction restores dependency hygiene."
    "Φ": "The scene may be recontextualized as theological proof, universal history, sex truth, or guilt origin unless bounded."
    "Χ": "Distance is required to keep symbolic/theological readings adjacent and prevent immediate proof, verdict, or application."
    "Σ": "Integration remains open when Eden demonstrates the grammar without replacing it."
    "Ψ": "Self-binding means the EDEN reading remains bound to its own demotion formulas and release conditions."
  derived_axes_reference:
    fixed_axes: ["A", "C", "R", "E", "D"]
    mutation_policy: "No PMS derived axis is added, removed, or redefined."
  derived_axes:
    A:
      name: "Awareness"
      formula: "Θ ∘ □ ∘ Δ"
      case_use: "Awareness concerns the visible distinction between origin-frame and test-scene-frame across the corrected order of presentation."
    C:
      name: "Coherence"
      formula: "Θ ∘ Λ ∘ □ ∘ ∇"
      case_use: "Coherence is strained if the non-clarified origin frame lets mythic teaching pressure override dependency hygiene."
    R:
      name: "Responsibility"
      formula: "Ψ ∘ Φ ∘ Θ ∘ Ω"
      case_use: "Responsibility is traced as answerability for the interpretive effect of making Eden found what PMS-EDEN says it only demonstrates."
    E:
      name: "Strict Action / Enactment"
      formula: "Σ ∘ Θ ∘ ∇"
      case_use: "Strict enactment appears in the explicit framing move that presents Eden as origin or, conversely, as bounded demonstration."
    D:
      name: "Dignity-in-Practice"
      formula: "Ψ ∘ Χ ∘ Ω"
      case_use: "D is preserved by refusing guilt-origin, sex-blame, and person-condemning uses of the scene."
  pms_conformity_note: "No PMS operator, dependency, or derived axis is redefined."

eden_map:
  scene_packet_summary:
    field_id: 1
    result: "Bounded interpretive scene: role_A frames Eden as learning/transgression origin; role_B maps Eden as a late minimal PMS-EDEN test scene. The evidence limit is strict: mythic resemblance cannot replace schema dependency."

  real_omega_mapping:
    field_id: 2
    result: "Real Ω lies in explanatory control, recognition control, timing/order of dependence, and explanation burden. The asymmetry is not itself failure."
    support: "strong"
    asymmetry_is_not_failure: true

  dominant_false_coordination_frame:
    field_id: 3
    candidate: "legitimation"
    result: "not_established"
    test_formula: "real Ω + false coordination frame + displaced R + blocked Σ/Ψ = false-coordinated real Ω"
    note: "A false-coordination risk appears only if the learning/transgression frame legitimates the theory by reversing dependency, displacing R into guilt or sexed blame, and blocking Σ/Ψ around the schema's non-origin boundary. In this case, Σ/Ψ remain open enough that no dominant false-coordination frame is established."

  responsibility_and_action_power_distribution:
    field_id: 4
    result: "R attaches to the framing effect, not to persons, sexes, theology, or moral worth."
    role_A: "Role_A carries responsibility for the interpretive effect of making Eden an origin or proof path when the schema denies that role."
    role_B: "Role_B carries responsibility for preserving the boundary without dismissing adjacent theological, literary, symbolic, or anthropological readings."
    indirect_action_power: "present"
    responsibility_result: "proportionate"

  sigma_psi_status:
    field_id: 5
    Σ: "partially_open"
    Ψ: "open"
    result: "Σ remains partially open because the scene can be integrated as demonstration; Ψ remains open if the reading is self-bound to the claim that Eden does not found, teach, or authorize PMS-EDEN."

  cost_distribution:
    field_id: 6
    result: "Costs concentrate around explanation, recognition, legibility, and Χ rather than bodily exposure, repair demand, or direct interpersonal waiting cost."
    costs:
      visibility: "shared"
      explanation: "shared"
      reaction: "none"
      waiting: "none"
      binding: "role_B"
      protection: "shared"
      speech: "shared"
      repair: "none"
      dignity: "shared"
      exposure: "none"
      recognition: "shared"
      legibility: "shared"
      Χ: "role_B"
      option_loss: "shared"
    bidirectionality_guardrail: "Bidirectionality is not symmetry; shared loss does not imply equal loss."

  non_action_and_non_binding:
    field_id: 7
    non_action_classification: "structuring_non_event"
    non_binding_classification: "legitimate_openness"
    result: "The relevant non-event is non-clarification of Eden's non-foundational role. Non-binding remains legitimate where a reading simply stays inside an adjacent framework and does not claim EDEN authority."
    coercion_guardrail: "Naming non-binding or shifted Ψ-load does not authorize compelled clarity, commitment, disclosure, or continued engagement."

  immunization_overexposure_AEP:
    field_id: 8
    immunization:
      status: "not_supported"
      possible_location: "none"
      note: "No scene-bound immunity profile is established; the case concerns interpretive dependency hygiene, not protected role exemption from responsibility."
    overexposure:
      status: "not_supported"
      possible_location: "none"
      note: "No scene-bound overexposure profile is established; no role is forced into responsibility without protection or language."
    AEP:
      status: "not_supported"
      possible_location: "none"
      formula: "AEP = high exposure + low legitimate language + critique-to-threat switch + responsibility overload"
    profile_guardrail: "Profiles are scene-bound drift patterns, not sex truths."

  counter_scene_and_falsifier:
    field_id: 9
    strongest_counter_scene: "The same Eden material may be read as theological, literary, symbolic, or anthropological teaching in an adjacent framework, while PMS-EDEN merely states that such readings neither found nor govern its praxeological schema."
    support_for_counter_scene:
      - "The reading declares its domain outside PMS-EDEN."
      - "It does not derive PMS-EDEN mechanisms from Eden."
      - "It preserves the distinction between symbolic/theological meaning and praxeological mapping."
    principal_falsifiers:
      - "No dependency reversal from test scene to foundation occurs."
      - "The reading does not convert breach into knowledge-origin, guilt-origin, sex-truth, PFO-origin, or Reciprocity-Loss source."
      - "Σ/Ψ remain open because the scene is explicitly bounded as demonstration."
      - "A rival adjacent-framework explanation is stronger for the interpretive aim."
    result: "EDEN_narrowed"
    no_model_immunity: "If no falsifier can be named, the EDEN reading is methodologically unsafe."

  description_application_status:
    field_id: 10
    mode: "description_only"
    firewall: "active"
    firewall_reference: "description_to_action_firewall"
    permitted_output: "scene-bound structural mapping"
    application_status: "not_authorized"
    application_requirements_if_any:
      - "scene_packet"
      - "counter_scene_exposure"
      - "Χ"
      - "reversibility"
      - "D"
      - "contextual_responsibility"
      - "affected_role_contestation_standing"
      - "independent_application_authority"
    prohibited_outputs:
      - "diagnosis"
      - "person_label"
      - "sex_ranking"
      - "moral_verdict"
      - "recommendation"
      - "intervention_protocol"
      - "coercive_authorization"
    application_note: "EDEN-MAP supplies no independent application authority."

  revision_point_or_open_question:
    field_id: 11
    mandatory: true
    statement: "The map would be narrowed or defeated if the example were explicitly presented as an adjacent theological, literary, symbolic, or anthropological interpretation rather than as a claim about PMS-EDEN's own foundation or proof path."

