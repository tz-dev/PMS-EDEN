  id: "example_3_teaches_nothing_vs_learning_or_transgression_myth"
  title: "Teaches Nothing vs. the Learning or Transgression Myth"
  subtitle: "Eden as late minimal test scene, not origin lesson"
  status: "example"
  model: "PMS-EDEN"
  model_schema_version: "PMS-EDEN_2.0"
  base_schema: "PMS_1.3"
  file_name: "Example 3 - Teaches Nothing vs. the Learning or Transgression Myth.yaml"
  authorship:
    originator: "T. Zöller"
    formalization_assistant: "ChatGPT"
  purpose: "Demonstrate a bounded EDEN-MAP reading of a specified scene."
  case_type: "myth_correction"
  primary_focus:
    construct: "eden_scene.non_moral_boundary"
    construct_status: "overlay_construct"
    yaml_home: "regime_test_scene_and_loss_architecture.eden_scene.non_moral_boundary"
    secondary_constructs:
      - "regime_test_scene_and_loss_architecture.eden_scene"
      - "regime_test_scene_and_loss_architecture.eden_scene.breach_as_consequence_activation"
      - "regime_test_scene_and_loss_architecture.eden_scene.grammar_test"
