example_id: "PMS-EDEN_EX03"
example_version: "1.1"
schema_version: "PMS-EDEN_1.1"
example_label: "Teaches Nothing vs. the Learning / Transgression Myth"
example_status: "draft"
language: "en"
depends_on:
  - "PMS_1.3"
  - "PMS-EDEN_1.1"

minimal_vignette:
  title: "The threshold act as consequence-legibility without epistemic gain"
  scene_boundaries:
    domain: "threshold-crossing, breach, irreversibility, post-act meaning production, and consequence management"
    scope: "structural differentiation, trajectory activation, asymmetrical consequence distribution, and post-hoc learning narratives"
    out_of_scope:
      - "person-level judgement"
      - "motive attribution"
      - "heroic transgression narratives"
      - "virtue assessment"
      - "clinical or psychological interpretation"
      - "action prescription"
  short_scene: >
    A scene begins in a highly specified praxis configuration where options are
    already structurally available and legible. A threshold act is nevertheless
    enacted, despite the availability of alternatives. The act does not produce
    a reversible experiment, nor does it open a new option set. Instead, it
    binds consequences across time, makes gradients and residues newly salient,
    and forces the field into monitoring, protection, concealment, accounting,
    and post-hoc meaning production. What is later described as "learning" is
    structurally downstream of the act and functions as recontextualization
    under altered conditions, not as epistemic gain generated by the threshold
    itself.
  structural_focus: >
    The case examines PMS-EDEN's central claim that breach or threshold crossing
    teaches nothing in the praxeological sense. The decisive structural outcome
    is consequence-legibility under Θ/Ω/Λ, not new differentiation, not
    maturity gain, and not pedagogical advancement through transgression.
  scenic_elements:
    actors:
      - "role-position with threshold initiation capacity"
      - "role-position with higher downstream exposure or carry-over burden"
      - "shared field now reorganized under consequence management"
    salient_objects:
      - "threshold act"
      - "already available alternatives"
      - "irreversible trajectory effects"
      - "exposure gradients"
      - "monitoring and protection scripts"
      - "learning or growth narratives"
    trigger_event:
      label: "irreversible threshold crossing"
      description: >
        An already legible negative option is enacted, closing prior
        reversibility windows and binding the field to downstream consequences.

why_this_is_repo_useful:
  structural_focus: >
    This example is load-bearing for PMS-EDEN because it clarifies one of the
    overlay's strongest interpretive disciplines: breach does not generate new
    knowledge; it generates a consequence field. The example prevents the model
    from drifting into transgression-romanticism, moral pedagogy, or growth-
    through-loss mythology.
  repo_value:
    - >
      Demonstrates the difference between available differentiation and post-hoc
      narrative coherence.
    - >
      Makes visible why threshold crossing cannot be credited with epistemic
      expansion when options were already structurally legible.
    - >
      Shows how Φ can generate learning-talk after the fact without opening any
      new path in the original act.
    - >
      Clarifies the relation between breach, NRK, consequence-legibility, and
      irreversibility under Θ.
    - >
      Provides a strict example of how PMS-EDEN separates adaptation under loss
      from learning through new Δ.
  central_repo_question: >
    When a threshold act changes everything, what exactly has changed: the
    option set, or only the legibility and binding force of consequences?
  lens_relevance:
    threshold_marker_discipline: >
      The case directly instantiates the threshold-marker logic of PMS-EDEN:
      explicitness of option does not equal epistemic gain.
    breach_logic: >
      The example clarifies the breach chain as non-epistemic realization under
      available A=[Θ,□,Δ], followed by consequence binding rather than insight.
    anti_pedagogical_guard: >
      The case protects PMS-EDEN against retrospective conversion of
      irreversibility into "necessary learning" or deserved moral instruction.

operator_mapping:
  reduced_signature:
    primary: ["Δ", "□", "Θ", "Ω", "Λ", "Α", "Φ", "Χ", "Σ", "Ψ"]
    note: >
      The scene turns on already available differentiation, threshold crossing,
      temporal irreversibility, asymmetrical consequence exposure, post-hoc
      recontextualization, and the non-equivalence of adaptation and learning.
  operator_roles_in_scene:
    "Δ":
      scene_role: >
        Differentiation is already present before the threshold act. The option
        field is legible; the act does not create a new distinction.
    "∇":
      scene_role: >
        Directed pressure appears as the impulse to cross the threshold despite
        available alternatives and visible consequence possibility.
    "□":
      scene_role: >
        The initial frame is praxis availability under a highly specified scene.
        After the act, the frame shifts toward comparison, security, exposure
        control, and consequence accounting.
    "Λ":
      scene_role: >
        The non-event takes the form of the missing clean outcome, the missing
        return path, and the missing restoration of the prior field.
    "Α":
      scene_role: >
        Monitoring, concealment, protection, accounting, and justification
        stabilize as recurrent scripts under the new consequence field.
    "Ω":
      scene_role: >
        Asymmetry becomes newly salient in who initiated, who is exposed, who
        carries downstream costs, and who can or cannot absorb them.
    "Θ":
      scene_role: >
        The threshold act becomes non-resettable. Before/after cannot be
        collapsed, and the field is locked into trajectory effects.
    "Φ":
      scene_role: >
        Post-hoc meaning production reframes adaptation, endurance, and damage
        management as "learning," "growth," or necessary transgression.
    "Χ":
      scene_role: >
        Distance is tested where retrospective pedagogy emerges: can the field
        resist converting consequence into justified lesson?
    "Σ":
      scene_role: >
        Integration would require carrying altered consequences without myth,
        denial, or coercive narrative closure. Often, coherence claims outrun
        actual integration.
    "Ψ":
      scene_role: >
        Self-binding is tested in whether the field binds itself to restraint,
        repair capacity, and consequence-carrying, or instead to justificatory
        myths about necessary learning.
  derived_axes_projection:
    A:
      reading: >
        Awareness does not arise from the act itself; A was already structurally
        available beforehand. What rises afterward is consequence legibility,
        not new awareness through added Δ.
    C:
      reading: >
        Coherence is threatened by irreversibility and open remainder, then
        often narratively repaired through Φ-based learning stories.
    R:
      reading: >
        Responsibility sharpens around who initiated, who bears costs, and who
        narratively redistributes or moralizes the altered consequence field.
    E:
      reading: >
        The act is realization, but not automatically integrated action. It does
        not qualify as epistemically productive simply by having occurred.
    D:
      reading: >
        Dignity-in-Practice is stressed when irreversible exposure is later
        redescribed as deserved pedagogy or necessary growth.
  structural_mechanism_summary:
    sequence:
      - "A=[Θ,□,Δ] is already available before the threshold act."
      - "A negative option is enacted under ∇ within the already legible field."
      - "Θ binds the act into irreversible trajectory."
      - "Ω becomes salient in consequence distribution."
      - "Λ persists as missing clean return, repair, or restored field."
      - "□ shifts toward comparison/security/exposure management."
      - "Α stabilizes coping, concealment, and justification scripts."
      - "Φ produces learning narratives after the fact."
      - "No new Δ is generated; only consequence-legibility has increased."
    concise_formula: >
      available A -> threshold enactment -> Θ irreversibility -> Ω/Λ legibility
      -> □ shift -> Α management scripts -> Φ learning narrative ->
      no epistemic expansion

drift_position_in_master_trace:
  stage_label: "Threshold / breach transition into consequence field"
  master_trace_handle: >
    EDEN -> THRESHOLD -> NRK -> □comparison -> PS ->
    residual_stabilization(Λ/Φ/Α) -> (DEVALUATION|HUMILIATION) ->
    RECIPROCITY_LOSS
  local_position_note: >
    This case sits at the Eden/Threshold/Breach transition and shows why the
    act itself should not be redescribed as a gain event. It opens the
    downstream field in which Ω, Θ, Λ, and later Φ/Α become structurally active.

cost_layout:
  note: "Structural cost geometry only; non-moral; scene-bound."
  consequence_interfaces:
    irreversible_costs:
      - "loss of prior reversibility"
      - "locked trajectory effects"
      - "durable exposure"
      - "non-returnable remainder"
    ongoing_costs:
      - "monitoring load"
      - "protection and concealment work"
      - "accounting and justification effort"
      - "coordination under altered frame"
      - "meaning-management after loss"
  asymmetry_readout:
    omega_capacity_gradient: >
      Capacity to initiate the threshold act does not automatically equal
      capacity to absorb downstream burdens once the field changes.
    omega_exposure_gradient: >
      Exposure to consequence and carry-over often distributes unevenly across
      role-positions after irreversibility binds.
    omega_obligation_gradient: >
      Some roles may become structurally positioned to absorb monitoring,
      protection, or repair work without having set the original threshold act.
    omega_leverage_gradient: >
      Learning narratives can function as leverage by turning consequence
      carrying into a supposed lesson rather than an irreversible burden.
  system_effect: >
    The system must now manage a transformed field whose costs are durable and
    ongoing. The key change is not new knowledge but new consequence-management
    obligations under irreversibility.

pattern_markers:
  max_expected: 3
  markers:
    - id: "P-Λ-DN"
      label: "Λ -> Denial / Suppression"
      operator_links: ["Λ", "Φ", "Α"]
      indicator: >
        The missing return path or irrecoverable loss is covered by narratives
        that imply the outcome was somehow necessary, meaningful, or redeemed.
    - id: "P-Σ-SIM"
      label: "Σ-Simulation instead of Integration"
      operator_links: ["Σ", "Φ", "Λ", "Θ"]
      indicator: >
        Coherence is narrated as "learning" or "growth," while the option field
        itself has not expanded and remainder remains active.
    - id: "P-Ψ-EXT"
      label: "Ψ -> Externalization"
      operator_links: ["Ψ", "Χ", "Ω"]
      indicator: >
        Those bearing downstream costs are told they must accept the event as
        instructive or necessary, converting structural exposure into imposed
        lesson-absorption.
  additional_red_flags:
    - "This had to happen so we could learn."
    - "The loss was necessary for growth."
    - "Questioning the lesson means denial."
    - "Now we know more, therefore the breach was worth it."
    - "Suffering proves development."

validity_gate_reminder:
  pms_entry_condition:
    chi_distance: >
      Distance must remain active against retrospective pedagogy. The field must
      be able to distinguish consequence-legibility from moralized lesson-making.
    reversibility: >
      The mapping must remain scene-bound and revisable. It must not become a
      global theory that every threshold crossing is secretly instructive.
    dignity_in_practice: >
      Irreversible exposure must not be converted into deservedness, educational
      necessity, or justified standing reduction.
  case_specific_validity_test:
    valid_if:
      - >
        The threshold act is not credited with generating new Δ when the option
        field was already structurally available.
      - >
        "Learning" is treated, where relevant, as downstream Φ under altered
        conditions rather than as the product of the breach itself.
      - >
        Open Λ is carried explicitly rather than collapsed into redemption
        narrative.
      - >
        Ω is named without turning exposure into moral desert.
    formally_invalid_if:
      - >
        The act is retroactively celebrated as epistemic upgrade simply because
        consequences later became legible.
      - >
        Irreversibility is transformed into moral pedagogy or necessary lesson.
      - >
        Χ is attacked by claiming that doubt about the learning myth proves
        immaturity or denial.
      - >
        PMS language is used to justify exposure rather than to map it.

readable_structural_closure:
  summary_2_to_5_sentences: >
    This case shows why PMS-EDEN says that breach teaches nothing. The threshold
    act does not add new differentiation; it binds consequences, hardens
    gradients, and leaves the field reorganizing itself around irreversibility
    and remainder. What later appears as "learning" is typically a Φ-based
    recontextualization of adaptation under loss, not epistemic gain generated
    by the act itself. Under PMS-EDEN, the decisive distinction is between
    consequence-legibility and genuine expansion of the option set.

extended_scene_analysis:
  frame_validity_check:
    operator: "□"
    in_scope:
      - "threshold crossing"
      - "already legible options"
      - "post-act comparison/security framing"
      - "monitoring and protection scripts"
      - "learning narrative production"
    out_of_scope:
      - "heroic transgression mythology"
      - "automatic maturation claims"
      - "moral pedagogy through loss"
    drift_signal: >
      The field drifts when post-threshold consequence management is redescribed
      as proof that the act itself was epistemically productive.
  non_event_integrity_check:
    operator: "Λ"
    decisive_absences:
      - "no reversible trial outcome"
      - "no clean restoration of the prior field"
      - "no new option created by the act itself"
    drift_signal: >
      Λ remains central because what is missing is precisely the clean return,
      the undoing, and the epistemic surplus that learning mythology claims.
  asymmetry_audit:
    operator: "Ω"
    exposure_bearers:
      - "downstream cost bearers"
      - "roles carrying altered consequence load"
      - "roles managing protection or fallout"
    capacity_holders:
      - "threshold initiator"
      - "roles able to narrate or justify the act"
      - "roles with more distance from ongoing consequence"
    drift_signal: >
      The key asymmetry is between initiation and downstream carrying, not
      between innocence and guilt.
  temporality_and_trajectory:
    operator: "Θ"
    trajectory_pattern:
      - "available option field"
      - "threshold crossing"
      - "irreversible consequence binding"
      - "exposure hardening"
      - "monitoring / protection / accounting"
      - "post-hoc meaning production"
    drift_signal: >
      The structural point of no return is temporal, not epistemic: once the
      act binds, the field has changed in a way that cannot be undone by better
      interpretation.
  recontextualization_dynamics:
    operator: "Φ"
    key_shift: >
      Endurance, adaptation, or damage control are reframed as "learning,"
      turning post-breach coherence work into a myth of epistemic benefit.
    drift_signal: >
      Φ becomes distortive when it treats constraint management as if it had
      produced new differentiation rather than merely stabilizing meaning.
  distance_enforcement:
    operator: "Χ"
    core_test: "Can the field resist moralizing irreversibility into pedagogy?"
    erosion_markers:
      - "questioning the lesson is framed as denial"
      - "pain is redescribed as necessary education"
      - "consequence is treated as proof of growth"
      - "distance from the myth is punished"
    pms_relevance: >
      PMS-EDEN requires Χ to prevent retroactive legitimation of exposure and to
      preserve the distinction between consequence and insight.
  integration_quality:
    operator: "Σ"
    must_integrate:
      - "the altered consequence field"
      - "the persistence of Λ"
      - "asymmetrical downstream burdens"
      - "the non-equivalence of adaptation and learning"
    drift_signal: >
      Σ fails when coherence is restored only narratively and the scene acts as
      though the act had opened new options it never actually created.
  self_binding_test:
    operator: "Ψ"
    decisive_question: "What is the field binding itself to after the threshold act?"
    valid_form: >
      The field binds itself to restraint, consequence-carrying, repair
      capacity, and non-mythologizing acknowledgment of what has changed.
    invalid_form: >
      The field binds itself to justificatory narratives that convert
      irreversibility into necessity, growth, or deserved lesson.

assistant_test_vectors:
  promptables:
    - "Map why this threshold act teaches nothing in PMS-EDEN terms."
    - "Explain the difference between consequence-legibility and epistemic gain."
    - "Where does Φ create a learning narrative without new Δ?"
    - "Show how Θ and Ω make the act binding rather than informative."
    - "Describe why adaptation under loss is not the same as learning through differentiation."