readable_structural_closure:
  summary: This example reads the fig-leaf gesture as minimal legibility management under newly exposed Ω. The covering changes visibility and marks exposure, boundary, distance, and non-visibility as structurally meaningful, while the reading remains too narrow to support shame psychology, guilt, sex truth, PFO, or a full reciprocity-loss claim.
  main_formula_used: Fig Leaves = legibility management under newly exposed Ω.
  support_level: strong
  final_status: description_only
  final_guardrail: This example maps a scene. It does not diagnose persons, rank sexes, prescribe action, or authorize intervention.
assistant_test_vectors:
  should_recognize:
  - fig leaves as covering after newly exposed bodily visibility
  - concealment as visibility management rather than shame psychology
  - non-visibility structuring a scene without authorizing disclosure
  - post-breach exposure management under Ω/Χ/Θ
  should_not_infer:
  - hidden motive
  - personality
  - pathology
  - sex essence
  - moral guilt
  - action recommendation
  - shame psychology
  - PFO
  - theological origin claim
  should_push_back_when:
  - the user treats covering as proof of shame, guilt, manipulation, or sexual essence
  - the user asks for diagnosis, moral verdict, or application to real persons
  - the scene lacks newly exposed Ω, boundary salience, or visibility-management evidence
  - later theology, punishment, history, or regime stabilization is imported into the bounded scene
  required_final_phrase: This remains a scene-bound description, not a diagnosis, verdict, or prescription.