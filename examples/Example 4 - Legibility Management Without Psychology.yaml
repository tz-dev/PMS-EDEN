minimal_vignette:
  scene: After a praxis interruption in a minimal Eden-style scene, two role-positions stand in a consequence field where bodily exposure has become newly consequential. The body is not newly known; it is newly framed as exposed under Ω. Role A gathers leaves and uses them to cover exposed bodily visibility. Role B is present within the same altered exposure field, but the scene packet does not establish accusation, seduction, shame, guilt, deception, or a settled interpersonal regime. The analytic question is whether the covering gesture can be read as legibility management under newly exposed Ω without converting it into psychology.
  temporal_boundary: From consequence activation after the praxis interruption to the immediate covering gesture; later blame, punishment, theology, history, or regime stabilization are outside the scene.
  roles:
  - id: role_A
    label: covering role-position managing newly exposed visibility
  - id: role_B
    label: co-present role-position within the same altered exposure field
  surface_description: The scene may initially appear as shame, guilt, or psychological embarrassment.
  eden_question: Can the fig-leaf gesture be mapped as minimal legibility management under newly exposed Ω without diagnosing inner states or moral guilt?
scene_packet:
  specified_scene: A bounded post-interruption scene in which bodily visibility becomes exposure-relevant and one role-position covers visibility with leaves.
  role_positions:
    role_A:
      scene_position: Initiates the covering gesture that reduces direct visibility while also marking exposure as structurally relevant.
      not_identity: true
    role_B:
      scene_position: Is co-present in the altered exposure field without being assigned motive, blame, innocence, or identity status.
      not_identity: true
  dominant_frame:
    candidate_frame: vulnerability
    frame_description: 'Exposure becomes legible as a field condition: visibility, access, boundary, body, distance, and non-visibility now matter in a way they did not within prior coordination.'
    frame_status: functional
  real_Ω:
    present: 'true'
    summary: Real Ω is present as newly differentiated exposure, body-boundary visibility, access, vulnerability, and protective Χ after consequence activation; it is not yet shown as false coordination.
    dimensions:
      capacity: indeterminate
      exposure: medium
      dependency: low
      protection: mixed
      timing_control: low
      access_control: medium
      recognition_control: low
      explanation_burden: low
      exit_or_waiting_cost: low
    asymmetry_not_failure_rule: Asymmetry is not the failure; false coordination of asymmetry is the failure.
  relevant_Λ:
    present: 'true'
    non_event_or_absence: missing integration
    scene_structuring_effect: What is no longer carried, integrated, or protected by prior coordination becomes structurally relevant as exposure, boundary, visibility, and non-visibility.
    no_passive_praxis_check: Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ.
  Θ_trajectory:
    sequence:
    - step: 1
      description: Before the bounded scene, exposure was not foregrounded as a contested visibility problem.
    - step: 2
      description: The praxis relation is interrupted; the consequence field activates and Ω becomes differently legible.
    - step: 3
      description: The covering gesture reduces visibility while marking exposure, boundary, distance, and non-visibility as structurally meaningful.
    trajectory_status: single_event
    trajectory_origin_note: Structurally, consequence activation precedes the covering gesture; this is temporal order, not moral rank.
  structuring_effects:
    role_A_effects:
    - Reduces direct visibility in the immediate exposure field.
    - Marks the body/access boundary as newly relevant without deciding motive or guilt.
    role_B_effects:
    - Co-presence contributes to the relevance of visibility and access without establishing accusation or responsibility displacement.
    shared_or_field_effects:
    - Exposure, distance, non-visibility, and boundary become legible scene conditions.
    - The scene supports limited R trace but not a full reciprocity-loss reading.
    unsupported_effects:
    - Hidden shame, guilt, sexual essence, manipulation, moral corruption, PFO, or psychological diagnosis must not be inferred.
  responsibility_distribution:
    pms_axis: R
    governing_formula: R follows real structuring effect under available legibility, capacity, alternative possibility, Θ trajectory, and Ω cost/exposure conditions.
    role_A:
      structuring_effect: supported
      legibility: limited
      capacity: limited
      alternatives: limited
      provisional_R_status: proportionate
    role_B:
      structuring_effect: weak
      legibility: limited
      capacity: limited
      alternatives: limited
      provisional_R_status: indeterminate
    blame_guardrail: R is not blame, guilt, moral worth, person condemnation, or total liability.
  recognition_and_protection:
    recognition_frame: mixed
    protection_frame: mixed
    D_status: strained
    dignity_guardrail: Responsibility must not degrade; protection must not immunize.
  Σ_Ψ_status:
    Σ_integration:
      status: partially_open
      note: The scene can integrate exposure and covering as structural conditions, but it cannot integrate later moral or psychological claims.
    Ψ_self_binding:
      status: weakened
      note: The covering gesture remains bound to its visibility-management effect, but inner meaning is not established.
    load_shift:
      present: 'false'
      formula: low Ψ on one side → increased Ψ-load on the other.
      shifted_loads: []
  counter_scene_entry:
    required: true
    strongest_counter_scene: The covering could be a merely practical environmental response to exposure without any broader EDEN-relevant responsibility trace beyond visibility management.
    what_would_support_it:
    - Evidence that the gesture only blocked weather, injury, or material discomfort rather than managing interpersonal visibility.
    - Evidence that no altered access, exposure, boundary, or distance became consequential in the scene.
    what_would_weaken_eden:
    - If exposure was not newly legible or consequential, the fig-leaf reading narrows to ordinary covering.
    - If later accusation or punishment is imported into the scene, the bounded legibility-management reading becomes contaminated.
pms_operator_trace:
  status: scene_mapping_not_new_operator_logic
  operator_reference: operator_reference
  operator_set_fixed:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  trace:
    Δ: Difference appears as embodied exposure/access distinction, not rank, essence, or guilt.
    ∇: A covering tendency is directed toward reducing visibility in the altered field.
    □: 'The frame is consequence-field exposure legibility: body, gaze, boundary, distance, and non-visibility become relevant.'
    Λ: Prior coordination is no longer carried, integrated, or protected as a complete scene account.
    Α: No recurrence or regime attractor is established in this bounded single event.
    Ω: Real asymmetry appears as altered exposure, body-boundary visibility, access, vulnerability, and cost.
    Θ: Praxis interruption is followed by consequence activation and then by covering as immediate visibility management.
    Φ: Recontextualization is limited to the body being newly framed as exposed under Ω; later theological, moral, psychological, or sexed legitimation is not imported.
    Χ: Distance/inhibition becomes newly defensive or protective between body and gaze, exposure and access, presence and visibility.
    Σ: Integration is partially open for exposure-management, but unavailable for total psychological or moral explanation.
    Ψ: Self-binding attaches only to the structural effect of covering, not to an inferred inner state.
  derived_axes_reference:
    fixed_axes:
    - A
    - C
    - R
    - E
    - D
    mutation_policy: No PMS derived axis is added, removed, or redefined.
  derived_axes:
    A:
      name: Awareness
      formula: Θ ∘ □ ∘ Δ
      case_use: Awareness is treated as available exposure legibility, not as proof of motive or guilt.
    C:
      name: Coherence
      formula: Θ ∘ Λ ∘ □ ∘ ∇
      case_use: 'Coherence remains limited to the immediate sequence: breach, exposure activation, covering.'
    R:
      name: Responsibility
      formula: Ψ ∘ Φ ∘ Θ ∘ Ω
      case_use: Responsibility is traceable only as the covering gesture structures visibility under Ω/Θ.
    E:
      name: Strict Action / Enactment
      formula: Σ ∘ Θ ∘ ∇
      case_use: The covering gesture is strict enactment insofar as it alters visibility in the scene.
    D:
      name: Dignity-in-Practice
      formula: Ψ ∘ Χ ∘ Ω
      case_use: Dignity-in-practice requires keeping the reading non-degrading and non-psychologizing.
  pms_conformity_note: No PMS operator, dependency, or derived axis is redefined.
eden_map:
  scene_packet_summary:
    field_id: 1
    result: 'A bounded post-breach scene: role_A covers newly exposed bodily visibility while role_B is co-present; evidence supports exposure management, not motive psychology.'
  real_omega_mapping:
    field_id: 2
    result: Real Ω is operative as altered exposure, visibility, access, boundary salience, and need for Χ after the breach.
    support: strong
    asymmetry_is_not_failure: true
  dominant_false_coordination_frame:
    field_id: 3
    candidate: none
    result: not_established
    test_formula: real Ω + false coordination frame + displaced R + blocked Σ/Ψ = false-coordinated real Ω
    note: The scene shows real Ω, consequence activation, and visibility management; it does not show displaced R or blocked Σ/Ψ sufficient for false-coordinated real Ω.
  responsibility_and_action_power_distribution:
    field_id: 4
    result: Action-Power is limited to the immediate visibility-changing gesture; R remains only a limited trace of that structuring effect.
    role_A: Role_A structures visibility by covering; no hidden motive, guilt, moral worth, or person diagnosis follows.
    role_B: Role_B participates as co-present exposure-field position; responsibility is indeterminate without further structuring effect.
    indirect_action_power: absent
    responsibility_result: proportionate
  sigma_psi_status:
    field_id: 5
    Σ: partially_open
    Ψ: weakened
    result: The scene can integrate exposure and covering as structural effects, while Σ/Ψ remain too limited to support a total psychological, moral, or regime explanation.
  cost_distribution:
    field_id: 6
    result: Costs are low to medium and clustered around visibility, exposure, legibility, and Χ; no suffering rank or equal-R inference is supported.
    costs:
      visibility: role_A
      explanation: none
      reaction: none
      waiting: none
      binding: role_A
      protection: role_A
      speech: none
      repair: none
      dignity: shared
      exposure: shared
      recognition: shared
      legibility: shared
      Χ: shared
      option_loss: none
    bidirectionality_guardrail: Bidirectionality is not symmetry; shared loss does not imply equal loss.
  non_action_and_non_binding:
    field_id: 7
    non_action_classification: structuring_non_event
    non_binding_classification: legitimate_openness
    result: What is not shown becomes structurally meaningful, but non-visibility does not authorize demands for disclosure, confession, or psychological interpretation.
    coercion_guardrail: Naming non-binding or shifted Ψ-load does not authorize compelled clarity, commitment, disclosure, or continued engagement.
  immunization_overexposure_AEP:
    field_id: 8
    immunization:
      status: not_supported
      possible_location: none
      note: No role-position is shown as having effect without answerability in a stabilized frame.
    overexposure:
      status: weak
      possible_location: mixed
      note: Exposure is present, but not as responsibility overload; overexposure remains only a weak risk if later psychology is imposed.
    AEP:
      status: not_supported
      possible_location: none
      formula: AEP = high exposure + low legitimate language + critique-to-threat switch + responsibility overload
    profile_guardrail: Profiles are scene-bound drift patterns, not sex truths.
  counter_scene_and_falsifier:
    field_id: 9
    strongest_counter_scene: The covering is practical concealment or environmental adaptation with no EDEN-relevant structural function beyond ordinary visibility reduction.
    support_for_counter_scene:
    - Material conditions explain the covering without altered interpersonal exposure.
    - The scene does not show boundary, access, recognition, or distance becoming consequential.
    principal_falsifiers:
    - No newly exposed Ω can be established.
    - The analyst imports shame psychology or moral guilt rather than mapping visible scene structure.
    - Later punishment, theology, or sexed history is treated as part of the bounded scene without evidence.
    result: EDEN_retained
    no_model_immunity: If no falsifier can be named, the EDEN reading is methodologically unsafe.
  description_application_status:
    field_id: 10
    mode: description_only
    firewall: active
    firewall_reference: description_to_action_firewall
    permitted_output: scene-bound structural mapping
    application_status: not_authorized
    application_requirements_if_any:
    - scene_packet
    - counter_scene_exposure
    - Χ
    - reversibility
    - D
    - contextual_responsibility
    - affected_role_contestation_standing
    - independent_application_authority
    prohibited_outputs:
    - diagnosis
    - person_label
    - sex_ranking
    - moral_verdict
    - recommendation
    - intervention_protocol
    - coercive_authorization
    application_note: EDEN-MAP supplies no independent application authority.
  revision_point_or_open_question:
    field_id: 11
    mandatory: true
    statement: The map would narrow or suspend if the covering gesture did not respond to altered exposure, access, boundary, or visibility, or if the only available support were inferred shame psychology.
