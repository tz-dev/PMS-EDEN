minimal_vignette:
  scene: Two adults are in a deteriorated shared relation or joint process. Role A tells Role B that a mediator is being brought in so that they can “mediate the situation.” Role B prepares for a reciprocal clarification scene in which positions, costs, misunderstandings, and possible repair remain open. At the meeting, Role A presents the endpoint as already fixed: the practical purpose is to terminate the relation/process with less confrontation, while the mediation label still makes the scene appear neutral, balanced, and mutually process-oriented. The issue is not the legitimacy of ending something; it is whether a termination that is already fixed is being coordinated as if it were mediation.
  temporal_boundary: From the ambiguous mediation invitation through the first session or exchange in which the fixed termination purpose becomes operative.
  roles:
  - id: role_A
    label: initiating role that has already fixed or largely fixed termination
  - id: role_B
    label: affected role invited into the scene as if mediation remains reciprocally open
  surface_description: A neutral mediation process between two adults who both have a chance to speak.
  eden_question: Does the mediation frame preserve reciprocal openness, or does it falsely coordinate a real asymmetry created by an already-fixed termination endpoint?
scene_packet:
  specified_scene: A mediation-labeled encounter in which one role has already fixed termination while the other role enters under an expectation of reciprocal mediation.
  role_positions:
    role_A:
      scene_position: controls the timing, framing, and practical endpoint of the encounter by introducing mediation after termination is already fixed or nearly fixed
      not_identity: true
    role_B:
      scene_position: enters the encounter under the mediation frame and bears exposure, preparation, explanation, and reaction costs before the fixed endpoint is fully legible
      not_identity: true
  dominant_frame:
    candidate_frame: neutrality
    frame_description: The mediation label makes the scene legible as balanced, procedurally fair, and still open to mutual clarification, even though the practical endpoint may already be decided by one role.
    frame_status: potentially_false_coordination
  real_Ω:
    present: 'true'
    summary: The EDEN reading is that a mediation label can falsely coordinate real asymmetry when one role has already fixed termination but presents the encounter as reciprocally mediative. The structural issue is not termination itself and not mediation itself; it is the possible mismatch between endpoint control and openness framing, which can simulate Σ and externalize Ψ while shifting costs to the affected role.
    dimensions:
      capacity: mixed
      exposure: high
      dependency: medium
      protection: mixed
      timing_control: high
      access_control: medium
      recognition_control: medium
      explanation_burden: high
      exit_or_waiting_cost: high
    asymmetry_not_failure_rule: Asymmetry is not the failure; false coordination of asymmetry is the failure.
  relevant_Λ:
    present: 'true'
    non_event_or_absence: non-clarification
    scene_structuring_effect: The missing clarification that the encounter is termination-oriented rather than reciprocally mediative structures Role B’s preparation, exposure, timing, and expectation of correctability.
    no_passive_praxis_check: Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ.
  Θ_trajectory:
    sequence:
    - step: 1
      description: The relation or joint process becomes strained enough that mediation can appear plausible.
    - step: 2
      description: Role A introduces mediation while already holding a fixed or near-fixed termination endpoint.
    - step: 3
      description: Role B enters under an openness frame and later encounters termination as the operative endpoint, shifting explanation, waiting, reaction, and dignity costs.
    trajectory_status: single_event
    trajectory_origin_note: Structurally, Role A’s framing of the encounter goes first; this is not a total moral rank or person judgment.
  structuring_effects:
    role_A_effects:
    - selects a mediation label for a scene whose endpoint may already be fixed
    - controls timing and initial legibility of the encounter
    - can reduce direct self-binding by distributing the endpoint through procedural neutrality
    role_B_effects:
    - responds within the offered mediation frame
    - may disclose, explain, prepare, or wait under an expectation of reciprocal correctability
    shared_or_field_effects:
    - the word “mediation” becomes a frame that can either preserve reciprocity or simulate it
    - the presence of a mediator may increase procedural legitimacy without itself proving reciprocal openness
    unsupported_effects:
    - that Role A has bad motives
    - that termination is illegitimate
    - that Role B is entitled to continued engagement
    - that the mediator is responsible for the asymmetry without scene-specific evidence
  responsibility_distribution:
    pms_axis: R
    governing_formula: R follows real structuring effect under available legibility, capacity, alternative possibility, Θ trajectory, and Ω cost/exposure conditions.
    role_A:
      structuring_effect: supported
      legibility: available
      capacity: available
      alternatives: available
      provisional_R_status: underassigned
    role_B:
      structuring_effect: weak
      legibility: limited
      capacity: available
      alternatives: limited
      provisional_R_status: overassigned
    blame_guardrail: R is not blame, guilt, moral worth, person condemnation, or total liability.
  recognition_and_protection:
    recognition_frame: mixed
    protection_frame: mixed
    D_status: strained
    dignity_guardrail: Responsibility must not degrade; protection must not immunize.
  Σ_Ψ_status:
    Σ_integration:
      status: simulated
      note: The scene may appear integrated because both roles speak inside one procedure, while the decisive endpoint remains insufficiently integrated into the shared account.
    Ψ_self_binding:
      status: externalized
      note: Role A’s fixed endpoint may be displaced onto mediation, neutrality, or process language rather than owned as a structuring position.
    load_shift:
      present: 'true'
      formula: low Ψ on one side → increased Ψ-load on the other.
      shifted_loads:
      - Role B may carry the load of treating the scene as open while adapting to a fixed endpoint.
      - Role B may carry the burden of reacting properly to a termination that had been framed as mediation.
  counter_scene_entry:
    required: true
    strongest_counter_scene: 'The scene is genuine mediation or legitimate mediated termination: Role A clearly states before entry that the purpose is termination support, the endpoint is not falsely presented as open, and Role B has adequate standing to contest facts, timing, costs, and dignity conditions.'
    what_would_support_it:
    - The invitation explicitly says that termination is the practical purpose and mediation is only to structure communication.
    - The mediator states the scope, limits, and non-repair purpose before substantive exposure occurs.
    - Role B enters with adequate time, information, and contestation standing.
    - The session integrates Role B’s account without requiring Role B to perform consent to the termination.
    what_would_weaken_eden:
    - Evidence that the endpoint was not fixed before the mediation frame was introduced.
    - Evidence that both roles understood the encounter as mediated termination, not open mediation.
    - Evidence that the procedural frame preserved correction space and did not shift explanation or reaction costs.
pms_operator_trace:
  status: scene_mapping_not_new_operator_logic
  operator_reference: operator_reference
  operator_set_fixed:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  trace:
    Δ: Difference between mediation as open reciprocal clarification and mediated termination as structured closure.
    ∇: Directional pressure toward closure is introduced under a frame that may still appear open.
    □: The mediation frame makes the encounter legible as neutral, fair, and mutually process-oriented.
    Λ: The absence of early clarification about the fixed endpoint structures expectations, preparation, and exposure.
    Α: Only weakly present as a possible procedural attractor if the neutrality frame stabilizes the fixed endpoint as mutually processed.
    Ω: Timing, framing, endpoint, recognition, and explanation asymmetries are operative if Role A controls the closure conditions.
    Θ: The fixed endpoint precedes or overtakes the scene that is presented as mediation.
    Φ: Termination may be recontextualized as mediation, neutrality, maturity, or responsible process.
    Χ: Correction space is strained if Role B cannot revise the frame before exposure or contest the endpoint without appearing anti-process.
    Σ: Integration is simulated or partially blocked when the decisive endpoint is not integrated into the shared scene description.
    Ψ: Self-binding is externalized if the role that fixed termination lets the mediation frame carry the binding effect.
  derived_axes_reference:
    fixed_axes:
    - A
    - C
    - R
    - E
    - D
    mutation_policy: No PMS derived axis is added, removed, or redefined.
  derived_axes:
    A:
      name: Awareness
      formula: Θ ∘ □ ∘ Δ
      case_use: Awareness concerns whether the difference between open mediation and mediated termination is legible before costly exposure.
    C:
      name: Coherence
      formula: Θ ∘ Λ ∘ □ ∘ ∇
      case_use: Coherence is strained if a closure-directed trajectory is held inside an openness frame without sufficient clarification.
    R:
      name: Responsibility
      formula: Ψ ∘ Φ ∘ Θ ∘ Ω
      case_use: Responsibility follows the role that structures timing, endpoint, and legitimacy conditions, not the role that merely reacts inside the offered frame.
    E:
      name: Strict Action / Enactment
      formula: Σ ∘ Θ ∘ ∇
      case_use: Strict enactment is supported by the invitation, framing, and procedural staging; the missing clarification matters only as structuring praxis.
    D:
      name: Dignity-in-Practice
      formula: Ψ ∘ Χ ∘ Ω
      case_use: Dignity-in-practice is strained if a role is exposed to a fixed endpoint under a frame that limits correction, contestation, or self-binding.
  pms_conformity_note: No PMS operator, dependency, or derived axis is redefined.
eden_map:
  scene_packet_summary:
    field_id: 1
    result: The bounded scene is a mediation-labeled encounter whose practical endpoint may already be termination; role positions, timing, evidence limits, and the mediation/termination distinction remain central.
  real_omega_mapping:
    field_id: 2
    result: Real Ω lies in timing control, endpoint control, frame control, recognition control, and shifted explanation or reaction costs.
    support: strong
    asymmetry_is_not_failure: true
  dominant_false_coordination_frame:
    field_id: 3
    candidate: neutrality
    result: established
    test_formula: real Ω + false coordination frame + displaced R + blocked Σ/Ψ = false-coordinated real Ω
    note: The frame falsely coordinates real Ω if “mediation” makes a fixed termination appear reciprocally open and procedurally balanced.
  responsibility_and_action_power_distribution:
    field_id: 4
    result: Role A has the stronger action-power where it selects the mediation frame, controls timing, and fixes the endpoint; Role B mainly reacts under constrained legibility.
    role_A: Structuring effect is supported through initiation, framing, timing, and endpoint control.
    role_B: Structuring effect is weak and reactive; participation in the mediation frame does not by itself equal co-responsibility for the fixed endpoint.
    indirect_action_power: present
    responsibility_result: displaced
  sigma_psi_status:
    field_id: 5
    Σ: simulated
    Ψ: externalized
    result: The process may simulate integration by placing both roles in one procedural scene, while self-binding for the fixed endpoint is externalized into mediation language.
  cost_distribution:
    field_id: 6
    result: Costs concentrate on Role B where Role B must prepare, explain, wait, react, and preserve procedural composure under a frame whose endpoint was not equally open.
    costs:
      visibility: role_B
      explanation: role_B
      reaction: role_B
      waiting: role_B
      binding: role_B
      protection: mixed
      speech: shared
      repair: role_B
      dignity: role_B
      exposure: role_B
      recognition: role_B
      legibility: role_B
      Χ: role_B
      option_loss: role_B
    bidirectionality_guardrail: Bidirectionality is not symmetry; shared loss does not imply equal loss.
  non_action_and_non_binding:
    field_id: 7
    non_action_classification: structuring_non_event
    non_binding_classification: Ψ_load_shift
    result: The relevant non-event is the missing early clarification that the scene is termination-oriented; the Ψ-load shift is only supported as a mediated form of non-binding where Role A lets the process frame carry closure while Role B must organize around presumed reciprocal openness.
    coercion_guardrail: Naming non-binding or shifted Ψ-load does not authorize compelled clarity, commitment, disclosure, or continued engagement.
  immunization_overexposure_AEP:
    field_id: 8
    immunization:
      status: supported
      possible_location: role_A
      note: The mediation frame can protect Role A from full criticizability for the already-fixed endpoint by presenting the endpoint as procedurally processed.
    overexposure:
      status: supported
      possible_location: role_B
      note: Role B can become overexposed by having to speak, react, or accept procedural legitimacy without full legibility of the actual endpoint.
    AEP:
      status: not_supported
      possible_location: none
      formula: AEP = high exposure + low legitimate language + critique-to-threat switch + responsibility overload
    profile_guardrail: Profiles are scene-bound drift patterns, not sex truths.
  counter_scene_and_falsifier:
    field_id: 9
    strongest_counter_scene: 'This is not false mediation but legitimate mediated termination: the closure purpose is disclosed before exposure, mediation is used only to structure communication and dignity conditions, and Role B can contest timing, facts, and costs without being treated as anti-mediation.'
    support_for_counter_scene:
    - Clear pre-entry notice that the endpoint is termination rather than open repair.
    - Adequate time for Role B to decide whether and how to participate.
    - A mediator who distinguishes mediation-of-process from mediation-of-outcome.
    - A scene record showing that Role B’s account changes the terms of closure or cost distribution.
    principal_falsifiers:
    - No fixed endpoint existed before mediation began.
    - Both roles already understood the encounter as mediated termination.
    - The procedure preserved correction space and did not shift costs asymmetrically.
    - Role B’s account was integrated in a way that materially affected timing, recognition, or closure conditions.
    result: EDEN_retained
    no_model_immunity: If no falsifier can be named, the EDEN reading is methodologically unsafe.
  description_application_status:
    field_id: 10
    mode: description_only
    firewall: active
    firewall_reference: description_to_action_firewall
    permitted_output: scene-bound structural mapping
    application_status: not_authorized
    application_requirements_if_any:
    - scene_packet
    - counter_scene_exposure
    - Χ
    - reversibility
    - D
    - contextual_responsibility
    - affected_role_contestation_standing
    - independent_application_authority
    prohibited_outputs:
    - diagnosis
    - person_label
    - sex_ranking
    - moral_verdict
    - recommendation
    - intervention_protocol
    - coercive_authorization
    application_note: EDEN-MAP supplies no independent application authority.
  revision_point_or_open_question:
    field_id: 11
    mandatory: true
    statement: The map would narrow or be defeated if the scene evidence showed that the fixed termination purpose was disclosed before Role B entered the mediation frame.
