readable_structural_closure:
  summary: The EDEN reading is that a mediation label can falsely coordinate real asymmetry when one role has already fixed termination but presents the encounter as reciprocally mediative. The structural issue is not termination itself and not mediation itself; it is the possible mismatch between endpoint control and openness framing, which can simulate Σ and externalize Ψ while shifting costs to the affected role.
  main_formula_used: real Ω + false coordination frame + displaced R + blocked Σ/Ψ = false-coordinated real Ω
  support_level: strong
  final_status: description_only
  final_guardrail: This example maps a scene. It does not diagnose persons, rank sexes, prescribe action, or authorize intervention.
assistant_test_vectors:
  should_recognize:
  - A scene described as mediation where one participant has already decided the outcome.
  - A termination presented as a neutral mediation process without early clarification.
  - A procedural frame that makes unilateral closure appear mutually processed.
  - A participant entering mediation expecting repair while the other participant uses it to stage closure.
  should_not_infer:
  - hidden motive
  - personality
  - pathology
  - sex essence
  - moral guilt
  - action recommendation
  should_push_back_when:
  - The user treats EDEN-MAP as proof that one person must continue, apologize, disclose, or accept blame.
  - The scene lacks evidence that the endpoint was fixed before the mediation frame was introduced.
  - Both roles clearly understood the process as mediated termination from the start.
  - The user asks for diagnosis, mediation strategy, legal advice, or coercive authorization.
  required_final_phrase: This remains a scene-bound description, not a diagnosis, verdict, or prescription.