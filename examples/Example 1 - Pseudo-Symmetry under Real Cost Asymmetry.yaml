readable_structural_closure:
  summary: >
    This example maps a pseudo-symmetry configuration: the scene speaks equality,
    mutual flexibility, and shared responsibility while real Ω remains unevenly
    distributed through timing control, deadline exposure, waiting, explanation,
    and option-loss. The EDEN reading is retained as a bounded description
    because the parity frame appears to simulate Σ, displace R, and shift Ψ-load,
    but it remains revisable through the named counter-scene and falsifiers.
    It does not by itself establish PFO, Reciprocity Loss, motive, manipulation,
    or any stable person profile.
  main_formula_used: "formal equality + unintegrated real Ω + displaced R + blocked Σ/Ψ"
  support_level: "strong"
  final_status: "description_only"
  final_guardrail: "This example maps a scene. It does not diagnose persons, rank sexes, prescribe action, or authorize intervention."

assistant_test_vectors:
  should_recognize:
    - "Both sides are called equally free, but only one side carries the waiting and explanation costs."
    - "A parity frame makes critique of unequal timing or cost appear anti-equal."
    - "Mutual flexibility language hides unequal deadline exposure and shifted Ψ-load."
    - "Shared-responsibility language distributes blame evenly while real structuring effect is uneven."
  should_not_infer:
    - "hidden motive"
    - "personality"
    - "pathology"
    - "sex essence"
    - "moral guilt"
    - "action recommendation"
  should_push_back_when:
    - "No consequential real Ω is shown."
