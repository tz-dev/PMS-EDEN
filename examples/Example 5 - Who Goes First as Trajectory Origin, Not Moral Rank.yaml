case_schema_version: "PMS-EDEN_CASE_2.0"

case_meta:
  id: "trajectory_origin_not_moral_rank"
  title: "Who Goes First as Trajectory Origin, Not Moral Rank"
  subtitle: "First visible move does not settle responsibility."
  status: "example"
  model: "PMS-EDEN"
  model_schema_version: "PMS-EDEN_2.0"
  base_schema: "PMS_1.3"
  file_name: "Who Goes First as Trajectory Origin, Not Moral Rank.yaml"
  authorship:
    originator: "T. Zöller"
    formalization_assistant: "ChatGPT"
  purpose: "Demonstrate a bounded EDEN-MAP reading of firstness as a Θ marker rather than moral rank."
  case_type: "trajectory_case"
  primary_focus:
    construct: "Θ trajectory origin as scene marker, not moral rank"
    construct_status: "application_protocol"
    yaml_home: "boundary_and_application_architecture.eden_map.scene_packet"
    secondary_constructs:
      - "responsibility_and_action_power"
      - "real_omega_mapping"
      - "sigma_psi_and_cost_distribution"
      - "non_passivity_and_non_binding"
    not_a_case_of:
      - "moral ranking"
      - "person diagnosis"
      - "sex ranking"
      - "origin blame"
      - "first-cause theory"

case_guardrails:
  non_diagnostic: true
  non_prescriptive: true
  non_verdictive: true
  non_person_labeling: true
  non_sex_ranking: true
  no_hidden_motive_inference: true
  no_psychological_diagnosis: true
  no_therapy_or_intervention_protocol: true
  description_to_action_firewall: "active"
  validity_gate_reference: "validity_gate"
  required_method_conditions:
    canonical_pms_entry_condition: ["Χ", "reversibility", "D"]
    eden_application_requirements:
      - "scene_packet"
      - "counter_scene_exposure"
      - "contextual_responsibility"
      - "evidentiary_answerability"
      - "affected_role_contestation"
      - "independent_application_authority"
  core_rule: "Map the scene; do not diagnose persons, prescribe action, rank sexes, or authorize intervention."
  invalid_if_any:
    - "Χ_suspended_for_clarity_or_urgency"
    - "reversibility_suspended_for_verdict"
    - "D_suspended_for_truth_or_efficiency"
    - "scene_packet_replaced_by_impression"
    - "counter_scene_cannot_change_reading"
    - "responsibility_without_scene_conditions"
    - "description_converted_directly_into_binding"
    - "person_or_sex_label_substituted_for_scene_analysis"
  prohibited_shortcuts:
    - "EDEN-by-vibe"
    - "PFO-by-vibe"
    - "identity-based_assignment"
    - "sex-truth_inference"
    - "personality_inference"
    - "motive_inference_from_operator_trace"
    - "description_converted_into_obligation"

minimal_vignette:
  scene: >
    In a shared housing move-out, the inspection time must be confirmed before
    two residents can arrange work leave and transport. Role B has been the
    person communicating with the landlord and has not confirmed the time for
    four days. Role A sends the first explicit pressure message in the group
    chat: "I need a confirmed time today; otherwise I cannot cover the handover."
    Role B replies that Role A "started the conflict" by going first publicly.
    The scene concerns whether first visible pressure is treated as moral rank
    or as one point inside a longer Θ trajectory that includes prior timing
    control, delay, waiting cost, and available alternatives.
  temporal_boundary: "From the first missed confirmation window to the group-chat reply that treats Role A's first explicit message as the origin of the conflict."
  roles:
    - id: "role_A"
      label: "first visible clarifier under waiting cost"
    - id: "role_B"
      label: "timing holder under confirmation responsibility"
  surface_description: "Role A appears to go first because Role A sends the first explicit pressure message."
  eden_question: "Does going first mark a Θ trajectory point without becoming moral rank, total blame, or a shortcut around prior structuring effects?"

scene_packet:
  specified_scene: "A bounded group-chat exchange about a move-out inspection time after several days of non-confirmation."
  role_positions:
    role_A:
      scene_position: "Needs a confirmed time to arrange leave and transport, then sends the first explicit pressure message."
      not_identity: true
    role_B:
      scene_position: "Controls the landlord communication channel and has not supplied the confirmation before the pressure message."
      not_identity: true

  dominant_frame:
    candidate_frame: "responsibility"
    frame_description: "The first explicit message is framed as the beginning of the conflict and therefore as the main responsibility marker."
    frame_status: "potentially_false_coordination"

  real_Ω:
    present: "true"
    summary: "Real asymmetry is mixed: Role B has timing and access control over the confirmation channel, while Role A has visibility once the first explicit pressure message is sent."
    dimensions:
      capacity: "mixed"
      exposure: "mixed"
      dependency: "medium"
      protection: "low"
      timing_control: "high"
      access_control: "medium"
      recognition_control: "medium"
      explanation_burden: "mixed"
      exit_or_waiting_cost: "medium"
    asymmetry_not_failure_rule: "Asymmetry is not the failure; false coordination of asymmetry is the failure."

  relevant_Λ:
    present: "true"
    non_event_or_absence: "delay"
    scene_structuring_effect: "The missing confirmation narrows Role A's planning options and makes the later first explicit message more likely to carry the visible cost of initiating pressure."
    no_passive_praxis_check: "Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ."

  Θ_trajectory:
    sequence:
      - step: 1
        description: "The confirmation window passes without a final inspection time, while Role B remains the communication channel to the landlord."
      - step: 2
        description: "Role A absorbs waiting cost and then sends the first explicit pressure message in the shared chat."
      - step: 3
        description: "The group frame risks converting Role A's first visible move into origin blame while excluding the prior delay and access asymmetry from Σ."
    trajectory_status: "accumulating_effect"
    trajectory_origin_note: "Role A goes first only as the first visible pressure point inside this bounded Θ; that firstness does not by itself establish moral rank, total R, or person fault."

  structuring_effects:
    role_A_effects:
      - "Creates a visible demand that changes the tone and timing of the group-chat scene."
      - "Introduces explicit language for a cost that had previously remained only implicit."
    role_B_effects:
      - "May maintain timing uncertainty if the confirmation channel, available alternatives, and relevant access control were real in the bounded scene."
      - "Reframes first visible pressure as conflict origin, which may displace attention from prior timing control if the prior delay materially structured cost or options."
    shared_or_field_effects:
      - "The group chat makes visibility uneven: the explicit message is easier to identify than the preceding non-confirmation."
      - "The scene can confuse trajectory origin with moral rank if prior Λ and Ω are not integrated."
    unsupported_effects:
      - "That Role A wanted conflict."
      - "That Role B intentionally delayed."
      - "That either role has a fixed personality pattern."
      - "That firstness alone proves responsibility."
      - "That Role B had real confirmation capacity without further evidence."

  responsibility_distribution:
    pms_axis: "R"
    governing_formula: "R follows real structuring effect under available legibility, capacity, alternative possibility, Θ trajectory, and Ω cost/exposure conditions."
    role_A:
      structuring_effect: "supported"
      legibility: "available"
      capacity: "available"
      alternatives: "limited"
      provisional_R_status: "overassigned"
    role_B:
      structuring_effect: "weak"
      legibility: "contested"
      capacity: "contested"
      alternatives: "contested"
      provisional_R_status: "underassigned"
    blame_guardrail: "R is not blame, guilt, moral worth, person condemnation, or total liability."

  recognition_and_protection:
    recognition_frame: "mixed"
    protection_frame: "absent"
    D_status: "strained"
    dignity_guardrail: "Responsibility must not degrade; protection must not immunize."

  Σ_Ψ_status:
    Σ_integration:
      status: "partially_open"
      note: "The explicit pressure message is available to the shared account, but the prior delay and access control are at risk of remaining outside it."
    Ψ_self_binding:
      status: "weakened"
      note: "Role A is bound to the visible demand more strongly than Role B is bound to the prior timing effect."
    load_shift:
      present: "true"
      formula: "low Ψ on one side → increased Ψ-load on the other."
      shifted_loads:
        - "Role A carries added explanation load for making the implicit timing cost explicit."
        - "Role A carries added reaction load when firstness is treated as conflict origin."

  counter_scene_entry:
    required: true
    strongest_counter_scene: "Role B may have lacked a confirmable time from the landlord, may have accurately communicated uncertainty, and Role A's deadline may have introduced a new constraint not previously shared."
    what_would_support_it:
      - "Messages showing Role B repeatedly reported genuine uncertainty and did not control the missing information."
      - "Evidence that Role A had not disclosed the work-leave deadline before the pressure message."
      - "Evidence that the group had agreed no confirmation could be expected before the landlord replied."
    what_would_weaken_eden:
      - "If the delay did not structure cost, options, exposure, or Ψ-load."
      - "If Role B's access control was merely nominal and not materially relevant."
      - "If the group account integrated both the delay and the first explicit message proportionately."

pms_operator_trace:
  status: "scene_mapping_not_new_operator_logic"
  operator_reference: "operator_reference"
  operator_set_fixed: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
  trace:
    "Δ": "Difference between first visible pressure and prior non-confirmation; difference is not rank."
    "∇": "Directionality appears when waiting cost moves from implicit burden to explicit demand."
    "□": "The group-chat frame makes explicit messages more legible than prior delay."
    "Λ": "The missing confirmation functions as a structuring delay only insofar as it narrows options and shifts cost."
    "Α": "A possible attractor forms if first visible pressure is repeatedly treated as conflict origin."
    "Ω": "Real asymmetry appears in timing control, access to the landlord channel, visibility, and explanation burden."
    "Θ": "The sequence moves from non-confirmation to explicit pressure to origin-blame framing."
    "Φ": "The phrase 'started the conflict' recontextualizes firstness as responsibility rank."
    "Χ": "Correction space remains available only if the group can distinguish first visible move from total origin blame."
    "Σ": "Integration is partial because the visible demand enters more easily than the prior delay."
    "Ψ": "Self-binding is weakened where the role structuring delay is less bound to its effect than the role naming the delay."
  derived_axes_reference:
    fixed_axes: ["A", "C", "R", "E", "D"]
    mutation_policy: "No PMS derived axis is added, removed, or redefined."
  derived_axes:
    A:
      name: "Awareness"
      formula: "Θ ∘ □ ∘ Δ"
      case_use: "Awareness concerns whether participants can see the difference between first visible message and earlier structuring delay."
    C:
      name: "Coherence"
      formula: "Θ ∘ Λ ∘ □ ∘ ∇"
      case_use: "Coherence is strained if the shared account begins at the first explicit message and omits the delay that shaped it."
    R:
      name: "Responsibility"
      formula: "Ψ ∘ Φ ∘ Θ ∘ Ω"
      case_use: "Responsibility is traced through real structuring effect across the trajectory, not assigned by firstness alone."
    E:
      name: "Strict Action / Enactment"
      formula: "Σ ∘ Θ ∘ ∇"
      case_use: "Role A's message is strict enactment, while Role B's delay is assessed only if it structures the scene under Λ/Ω/Θ."
    D:
      name: "Dignity-in-Practice"
      formula: "Ψ ∘ Χ ∘ Ω"
      case_use: "D is preserved when neither role is reduced to aggressor, victim, evader, or troublemaker by the firstness frame."
  pms_conformity_note: "No PMS operator, dependency, or derived axis is redefined."

eden_map:
  scene_packet_summary:
    field_id: 1
    result: "The bounded scene is a group-chat move-out coordination dispute where first visible pressure follows several days of non-confirmation; evidence limits prohibit inferring motive or character."

  real_omega_mapping:
    field_id: 2
    result: "Real Ω is mixed but operative: Role B holds timing/access control before the message, while Role A becomes visibly exposed after making the demand."
    support: "mixed"
    asymmetry_is_not_failure: true

  dominant_false_coordination_frame:
    field_id: 3
    candidate: "first-visible-move-as-origin-blame"
    result: "weakly_supported"
    test_formula: "real Ω + false coordination frame + displaced R + blocked Σ/Ψ = false-coordinated real Ω"
    note: "The frame becomes false only if it replaces the whole Θ with firstness and thereby underassigns delay-related R while overassigning Role A's visible demand; support remains weak because Σ is partially open and Ψ is weakened rather than fully blocked."

  responsibility_and_action_power_distribution:
    field_id: 4
    result: "Responsibility is distributed across prior timing control, available alternatives, visible demand, and the later origin-blame frame; the Role B side remains evidence-contingent rather than established as motive or character."
    role_A: "Role A structures a visible pressure event and therefore has local answerability for tone, timing, and explicit demand, but not total origin responsibility."
    role_B: "Role B may structure timing uncertainty if the confirmation channel, available alternatives, and relevant access control were real, and may have answerability for reframing firstness as conflict origin if that blocks integration."
    indirect_action_power: "present"
    responsibility_result: "displaced"

  sigma_psi_status:
    field_id: 5
    Σ: "partially_open"
    Ψ: "weakened"
    result: "The scene can integrate both roles only if first visible pressure and prior non-confirmation remain in the same account; otherwise Ψ-load shifts toward the role that spoke first. This supports a narrowed reading, not a full blocked-Σ/Ψ finding."

  cost_distribution:
    field_id: 6
    result: "Costs are crossed: Role A carries waiting, explanation, and visibility costs, while Role B may carry coordination, access, and reaction costs depending on actual landlord uncertainty."
    costs:
      visibility: "role_A"
      explanation: "role_A"
      reaction: "shared"
      waiting: "role_A"
      binding: "role_A"
      protection: "none"
      speech: "role_A"
      repair: "shared"
      dignity: "shared"
      exposure: "shared"
      recognition: "role_A"
      legibility: "role_A"
      Χ: "shared"
      option_loss: "role_A"
    bidirectionality_guardrail: "Bidirectionality is not symmetry; shared loss does not imply equal loss."

  non_action_and_non_binding:
    field_id: 7
    non_action_classification: "structuring_non_event"
    non_binding_classification: "not_relevant"
    result: "The delay is not automatically praxis; it becomes structurally relevant only if it changed options, waiting cost, timing pressure, or Ψ-load under the shared coordination frame."
    coercion_guardrail: "Naming non-binding or shifted Ψ-load does not authorize compelled clarity, commitment, disclosure, or continued engagement."

  immunization_overexposure_AEP:
    field_id: 8
    immunization:
      status: "weak"
      possible_location: "role_B"
      note: "Possible only if Role B's timing effect is shielded by treating Role A's first visible message as the sole origin."
    overexposure:
      status: "weak"
      possible_location: "role_A"
      note: "Possible only if Role A must carry conflict-origin responsibility for naming a cost structured before the message."
    AEP:
      status: "not_supported"
      possible_location: "none"
      formula: "AEP = high exposure + low legitimate language + critique-to-threat switch + responsibility overload"
    profile_guardrail: "Profiles are scene-bound drift patterns, not sex truths."

  counter_scene_and_falsifier:
    field_id: 9
    strongest_counter_scene: "The first visible message may genuinely be the relevant trajectory origin if no prior delay, access asymmetry, or expectation materially structured the scene."
    support_for_counter_scene:
      - "Documented landlord non-response outside Role B's control."
      - "Shared prior agreement that no one could confirm the time yet."
      - "No material planning cost before Role A's message."
      - "A group account that explicitly considers Role B's uncertainty and Role A's deadline."
    principal_falsifiers:
      - "No real Ω in timing, access, waiting cost, or explanation burden."
      - "Role B did not have any meaningful alternative or confirmation capacity."
      - "Σ/Ψ stayed open because the group integrated both the delay and the pressure message."
      - "Role A's first message introduced the decisive new constraint without prior notice."
    result: "EDEN_narrowed"
    no_model_immunity: "If no falsifier can be named, the EDEN reading is methodologically unsafe."

  description_application_status:
    field_id: 10
    mode: "description_only"
    firewall: "active"
    firewall_reference: "description_to_action_firewall"
    permitted_output: "scene-bound structural mapping"
    application_status: "not_authorized"
    application_requirements_if_any:
      - "scene_packet"
      - "counter_scene_exposure"
      - "Χ"
      - "reversibility"
      - "D"
      - "contextual_responsibility"
      - "affected_role_contestation_standing"
      - "independent_application_authority"
    prohibited_outputs:
      - "diagnosis"
      - "person_label"
      - "sex_ranking"
      - "moral_verdict"
      - "recommendation"
      - "intervention_protocol"
      - "coercive_authorization"
    application_note: "EDEN-MAP supplies no independent application authority."

  revision_point_or_open_question:
    field_id: 11
    mandatory: true
    statement: "The reading would narrow or fail if the evidence showed that Role B had no confirmation access, no available alternative, and no material role in the waiting cost before Role A's first message."

