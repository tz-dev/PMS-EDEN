example_id: "PMS-EDEN_EX05"
example_version: "1.1"
schema_version: "PMS-EDEN_1.1"
example_label: "Who Goes First? as Trajectory Origin, Not Moral Rank"
example_status: "draft"
language: "en"
depends_on:
  - "PMS_1.3"
  - "PMS-EDEN_1.1"

minimal_vignette:
  title: "Priority as asymmetry-origin under irreversibility"
  scene_boundaries:
    domain: "sequence-opening praxis, first-move asymmetry, trajectory binding, and post-origin handling"
    scope: "structural analysis of order, origin gradients, asymmetry, irreversibility, and later symmetry pressure"
    out_of_scope:
      - "person-level judgement"
      - "guilt attribution"
      - "intent inference"
      - "moral ranking"
      - "clinical or psychological interpretation"
      - "action prescription"
  short_scene: >
    A praxis scene reaches a point where indeterminacy cannot continue without a
    first act, commitment, or decision. One role-position moves first, and the
    other responds only after the scene has already changed. This first move
    does not create moral superiority or wrongdoing, but it does create a
    before/after structure that redistributes burdens, options, and exposure.
    Later discourse often attempts to neutralize this origin asymmetry through
    fairness rhetoric, repair narratives, or performed symmetry. PMS-EDEN
    treats the decisive issue as temporal and structural: who goes first marks
    the origin of the trajectory.
  structural_focus: >
    The case examines how sequence-origin generates Ω through Θ without
    implying blame. It tracks how first-move irreversibility alters later
    option sets, how Φ attempts to soften or erase origin effects, and how Α
    can stabilize pseudo-symmetry pressure when origin asymmetry is made
    rhetorically unspeakable.
  scenic_elements:
    actors:
      - "first-moving role-position"
      - "responding role-position"
      - "shared praxis scene with pending interface"
    salient_objects:
      - "first act or commitment"
      - "shifted option set"
      - "trajectory origin"
      - "repair narratives"
      - "symmetry claims"
      - "future coordination burdens"
    trigger_event:
      label: "sequence initiation"
      description: >
        One role-position resolves indeterminacy by acting first, thereby
        changing the scene for the responding role-position in a way that
        cannot be replayed without consequence.

why_this_is_repo_useful:
  structural_focus: >
    This example is important for PMS-EDEN because it prevents a recurring
    category error: turning sequence-origin into guilt, superiority, or moral
    rank. The YAML makes explicit that temporal priority creates structural
    asymmetry even where later rhetoric insists on equality.
  repo_value:
    - >
      Clarifies that origin asymmetry is generated by sequence under Θ, not by
      personal worth, virtue, or defect.
    - >
      Distinguishes responsibility as temporal-relational positioning from
      blame as moral framing.
    - >
      Shows how Φ can later soften, narrativize, or suppress origin effects
      without undoing them.
    - >
      Makes visible how pseudo-symmetry can begin from denial of trajectory
      origin, not only from static comparison.
    - >
      Protects PMS-EDEN from being misused as a guilt grammar when analyzing
      first-move asymmetries.
  central_repo_question: >
    How can a first move be structurally decisive without becoming a verdict
    about character, guilt, or authority?
  lens_relevance:
    origin_asymmetry: >
      The case directly supports PMS-EDEN's weighting and reciprocity logic by
      showing how sequence creates durable asymmetry before any moral
      interpretation is added.
    phi_pressure: >
      It illustrates the specific role of Φ in producing comfort-oriented repair
      narratives that can suppress origin asymmetry without structurally
      neutralizing it.
    chi_requirement: >
      It highlights why Χ is indispensable: origin must remain legible without
      being weaponized as accusation or purity test.

operator_mapping:
  reduced_signature:
    primary: ["Δ", "∇", "□", "Ω", "Θ", "Φ", "Α", "Χ", "Ψ", "Σ"]
    note: >
      The example centers on sequence-opening difference, first-move
      directional pressure, asymmetry generated by temporal origin, later
      narrative rebalancing, and the risk of pseudo-symmetry stabilization.
  operator_roles_in_scene:
    "Δ":
      scene_role: >
        The decisive difference is between before and after the first move, and
        between origin and response once the sequence has started.
    "∇":
      scene_role: >
        Directed pressure arises from the need to resolve indeterminacy through
        action, commitment, or decision.
    "□":
      scene_role: >
        The initial frame is praxis-coordination around a pending interface. It
        can later drift toward fairness accounting, moralization, or comparison
        once origin asymmetry becomes uncomfortable.
    "Λ":
      scene_role: >
        The missing conditions are simultaneous action, cost-free reset, and a
        truly neutral ordering without consequence effects.
    "Α":
      scene_role: >
        Repeated narrative smoothing, rotating justifications, and symmetry
        performance can stabilize into scripts that obscure origin gradients.
    "Ω":
      scene_role: >
        Asymmetry emerges from sequence itself: one role-position defines the
        origin point while the other acts under altered conditions.
    "Θ":
      scene_role: >
        Temporality binds the scene irreversibly. Once the first move occurs,
        the trajectory cannot be structurally reset to pre-origin indeterminacy.
    "Φ":
      scene_role: >
        Recontextualization enters after the fact through statements such as
        'we were equally involved' or 'it no longer matters who started,'
        attempting to rebalance meaning.
    "Χ":
      scene_role: >
        Distance is needed to keep origin legible without turning sequence into
        accusation, scorekeeping, or moral capture.
    "Σ":
      scene_role: >
        Integration would require future coordination that acknowledges origin
        asymmetry rather than erasing it rhetorically.
    "Ψ":
      scene_role: >
        Self-binding becomes relevant in whether future commitments orient
        toward coordination or toward settling scores and enforcing moral rank.
  derived_axes_projection:
    A:
      reading: >
        Awareness increases insofar as the sequence-origin becomes legible as a
        structural difference with downstream effects.
    C:
      reading: >
        Coherence is often narratively restored by Φ, but this coherence may be
        only rhetorical if origin asymmetry remains structurally active.
    R:
      reading: >
        Responsibility here means origin-positioning under Θ and Ω, not guilt.
        It tracks who moved first and how that restructured later possibilities.
    E:
      reading: >
        Action pressure is highest at the indeterminacy threshold where one move
        must begin the sequence and thereby bind the scene.
    D:
      reading: >
        Dignity-in-Practice is tested in whether origin asymmetry is handled
        with restraint or weaponized into verdict, humiliation, or blame.
  structural_mechanism_summary:
    sequence:
      - "Indeterminacy cannot continue indefinitely."
      - "One role-position acts first."
      - "Ω emerges as origin gradient."
      - "Θ binds the new trajectory irreversibly."
      - "The responding role-position faces an altered option set."
      - "Φ produces repair or equality narratives."
      - "Α can stabilize pseudo-symmetry pressure."
      - "Χ is required to prevent origin from becoming verdict."
    concise_formula: >
      indeterminacy -> first move -> Ω(origin gradient) -> Θ(binding) -> Φ
      symmetry repair -> Α pseudo-symmetry pressure -> Χ needed against
      moralization

drift_position_in_master_trace:
  stage_label: "Origin-weighting and asymmetry-legibility before full pseudo-symmetry stabilization"
  master_trace_handle: >
    EDEN -> THRESHOLD -> NRK -> □comparison -> PS ->
    residual_stabilization(Λ/Φ/Α) -> (DEVALUATION|HUMILIATION) ->
    RECIPROCITY_LOSS
  local_position_note: >
    This case is especially relevant to the weighting logic in PMS-EDEN §8 and
    to the later pseudo-symmetry regime in §9: denial of origin asymmetry is a
    key precursor to performed symmetry and dissatisfaction under real Ω/Θ.

cost_layout:
  note: "Structural cost geometry only; non-moral; scene-bound."
  consequence_interfaces:
    immediate_costs:
      - "loss of pre-sequence symmetry"
      - "shifted response space for the second role-position"
      - "need to reinterpret the scene from a new origin point"
      - "burden of adjustment after trajectory initiation"
    deferred_costs:
      - "persistent origin accountability across Θ"
      - "reactive positioning costs for the responding role-position"
      - "narrative labor to neutralize or suppress origin asymmetry"
      - "future coordination costs if origin remains morally overcoded or rhetorically denied"
  asymmetry_readout:
    omega_capacity_gradient: >
      The first-moving role-position has capacity to define the trajectory
      origin, while the second acts only under already transformed conditions.
    omega_exposure_gradient: >
      The responding role-position bears the exposure of reacting within a field
      that is no longer neutral or pre-open.
    omega_obligation_gradient: >
      The first move creates a differentiated burden of explanation,
      adjustment, or coordination that did not exist before the act.
    omega_leverage_gradient: >
      Origin status can become leverage if later frames either deny it or
      convert it into moral accusation rather than structural legibility.
  system_effect: >
    Once sequence is set, the system must either coordinate under origin
    asymmetry or spend ongoing effort trying to rhetorically neutralize it.
    The latter often becomes cheaper locally, which is why Φ/Α pressures toward
    pseudo-symmetry can intensify over time.

pattern_markers:
  max_expected: 3
  markers:
    - id: "P-Σ-SIM"
      label: "Σ-Simulation instead of Integration"
      operator_links: ["Σ", "Φ", "Θ"]
      indicator: >
        The scene speaks as if symmetry had been restored, but no actual
        coordination occurs around the origin gradient and its consequences.
    - id: "P-□-MOR"
      label: "□ -> Moral Frame Capture"
      operator_links: ["□", "Ω", "Χ"]
      indicator: >
        Sequence-origin is translated into blame, verdict, or purity talk,
        replacing temporal-relational analysis with moral capture.
    - id: "P-Ψ-EXT"
      label: "Ψ -> Externalization"
      operator_links: ["Ψ", "Χ", "Ω"]
      indicator: >
        Future obligations become score-settling demands imposed on the other
        rather than self-binding commitments to coordinated handling.
  additional_red_flags:
    - "It no longer matters who started."
    - "We were equally involved from the beginning."
    - "Origin means fault."
    - "Sequence is used as accusation."
    - "Fairness rhetoric erases changed response conditions."

validity_gate_reminder:
  pms_entry_condition:
    chi_distance: >
      Distance must keep origin asymmetry legible without permitting blame
      inflation, scorekeeping, or moral verdict capture.
    reversibility: >
      The scene itself is irreversible under Θ, but future handling must remain
      revisable, non-final, and open to renewed coordination.
    dignity_in_practice: >
      Unequal exposure created by sequence must not be used to degrade or rank
      either role-position.
  case_specific_validity_test:
    valid_if:
      - >
        Origin asymmetry is named as temporal-relational positioning rather than
        guilt.
      - >
        Irreversibility is acknowledged without converting it into moral
        authority.
      - >
        Φ is allowed to reinterpret meaning, but not to erase the structural
        fact of sequence-origin.
      - >
        Future Ψ binds toward coordination rather than accusation.
    formally_invalid_if:
      - >
        First-move priority is treated as proof of superiority, vice, or moral
        debt.
      - >
        The origin gradient is denied in the name of rhetorical equality while
        still operative in consequences.
      - >
        Θ-bound irreversibility is used to justify coercion or irreversible
        labeling.
      - >
        PMS terms are used to moralize sequence rather than to keep it
        structurally legible.

readable_structural_closure:
  summary_2_to_5_sentences: >
    This case shows that 'who goes first' matters in PMS-EDEN because sequence
    creates trajectory origin, not because it proves guilt or rank. The first
    move introduces Ω through Θ by changing the option space for whoever
    responds next. Later equality or repair rhetoric may soften the scene, but
    it cannot undo origin asymmetry once the sequence is bound. PMS-EDEN
    therefore treats priority as structural positioning under irreversibility,
    requiring Χ precisely so that origin does not harden into verdict.

extended_scene_analysis:
  frame_validity_check:
    operator: "□"
    in_scope:
      - "pending interface decisions"
      - "first move and response structure"
      - "sequence-origin effects"
      - "later fairness or repair narratives"
      - "future coordination under altered conditions"
    out_of_scope:
      - "guilt assignment"
      - "virtue ranking"
      - "intent psychologizing"
      - "person-level superiority claims"
    drift_signal: >
      The frame drifts when sequence-origin is no longer handled as structural
      asymmetry but as moral standing, fairness test, or adjudication surface.
  non_event_integrity_check:
    operator: "Λ"
    decisive_absences:
      - "no simultaneous move"
      - "no cost-free reset"
      - "no neutral ordering"
    drift_signal: >
      The missing neutral alternatives are load-bearing: later rhetoric often
      behaves as if the scene could be re-equalized structurally, when only
      interpretation can be reworked.
  asymmetry_audit:
    operator: "Ω"
    exposure_bearers:
      - "the role-position forced to respond under altered conditions"
      - "the role-position bearing downstream adjustment burden"
      - "the role-position whose options narrowed after the first move"
    capacity_holders:
      - "the role-position able to initiate sequence"
      - "the role-position defining origin point"
      - "the role-position whose action became reference for later interpretation"
    drift_signal: >
      Ω here is generated by origin position, not by worth or status. It is a
      directional asymmetry of sequence and altered options.
  temporality_and_trajectory:
    operator: "Θ"
    trajectory_pattern:
      - "indeterminacy"
      - "first move"
      - "response under changed conditions"
      - "origin accountability persists"
      - "repair narrative pressure rises"
      - "symmetry performance may stabilize"
    drift_signal: >
      The impossibility of replay is decisive. Once sequence begins, future
      handling occurs inside the new trajectory rather than outside it.
  recontextualization_dynamics:
    operator: "Φ"
    key_shift: >
      After sequence-origin is established, discourse often attempts to
      neutralize asymmetry through formulations of equality, mutuality, or
      irrelevance of who began.
    drift_signal: >
      Φ becomes distorting when it no longer reinterprets the trajectory but
      instead pretends origin effects were never structurally consequential.
  distance_enforcement:
    operator: "Χ"
    core_test: "Can origin remain legible without becoming accusation?"
    erosion_markers:
      - "sequence is translated directly into fault"
      - "origin becomes scorekeeping"
      - "purity tests appear"
      - "distance is denounced as evasion of responsibility"
    pms_relevance: >
      PMS requires that Χ prevent temporal fact from hardening into moral
      verdict while preserving origin visibility.
  integration_quality:
    operator: "Σ"
    must_integrate:
      - "origin asymmetry"
      - "altered response space"
      - "future commitments"
      - "limits of rhetorical equality"
    drift_signal: >
      Σ fails where the scene performs symmetry linguistically but does not
      coordinate around the structurally changed trajectory.
  self_binding_test:
    operator: "Ψ"
    decisive_question: "What do future commitments bind toward after the first move?"
    valid_form: >
      Future binding commits to coordination that acknowledges sequence-origin
      without moral capture or denial.
    invalid_form: >
      Future binding becomes score-settling, accusation, or compelled
      confession grounded in origin asymmetry.

assistant_test_vectors:
  promptables:
    - "Map how the first move creates Ω through Θ without implying guilt."
    - "Explain why sequence-origin is structural asymmetry, not moral rank."
    - "Show how Φ can soften origin asymmetry without undoing it."
    - "Where does pseudo-symmetry begin when people say 'it doesn't matter who started'?"
    - "Describe the role of Χ in keeping origin legible without turning it into verdict."